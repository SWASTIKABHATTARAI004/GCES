name: Deploy to Azure VM

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Azure Account
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Direct Script Upload via Azure VM Run Command
        uses: azure/run-vm-command@v1
        with:
          resourceGroupName: "DEMO-PRODUCTION-RG"  
          vmName: "intern-vm"
          commandId: "RunShellScript"
          script: |
            # 1. Ensure target directory setup exists
            mkdir -p /var/www/portfolio/v1 /var/www/portfolio/v2
            chown -R azureuser:azureuser /var/www/portfolio
            
            # 2. Detect the inactive slot
            CURRENT_TARGET=$(readlink -f /var/www/portfolio/current)
            if [ "$CURRENT_TARGET" = "/var/www/portfolio/v1" ]; then
              TARGET_DIR="/var/www/portfolio/v2"
              INACTIVE="v2"
            else
              TARGET_DIR="/var/www/portfolio/v1"
              INACTIVE="v1"
            fi
            
            # 3. Wipe and pull files down locally 
            rm -rf $TARGET_DIR/*
            git clone --depth 1 https://github.com /tmp/gces-deploy
            cp -r /tmp/gces-deploy/* $TARGET_DIR/
            rm -rf /tmp/gces-deploy
            
            # 4. Swap Symlinks atomically 
            ln -sfn $TARGET_DIR /var/www/portfolio/current_tmp
            mv -Tf /var/www/portfolio/current_tmp /var/www/portfolio/current
            
            # 5. Reload Apache 
            systemctl reload apache2
