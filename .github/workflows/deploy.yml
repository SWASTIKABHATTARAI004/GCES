name: Deploy Web App to Azure Apache VM

on:
  push:
    branches:
      - main
  workflow_dispatch: # ◄ Forces the manual button to activate

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log into Azure securely using your saved secret credentials
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Compress index.html into a safe, single-line text string and push it
      - name: Deploy HTML via Azure Run-Command
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            HTML_BASE64=$(base64 -w 0 index.html)
            
            # Change "YOUR_RESOURCE_GROUP_NAME" and "YOUR_VM_NAME" below
            az vm run-command invoke \
              --resource-group "DEMO-PRODUCTION-RG" \
              --name "INTERN-VM" \
              --command-id RunShellScript \
              --scripts "echo '$HTML_BASE64' | base64 -d > /var/www/html/index.html && systemctl restart apache2"

             
