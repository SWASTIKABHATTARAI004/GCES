name: Deploy to Azure VM

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Azure Account
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Script on Azure VM via Azure CLI
        uses: azure/cli-action@v2
        with:
          inlineScript: |
            az vm run-command invoke \
              --resource-group "DEMO-PRODUCTION-RG" \
              --name "intern-vm" \
              --command-id "RunShellScript" \
              --scripts "mkdir -p /var/www/portfolio/v1 /var/www/portfolio/v2 && chown -R azureuser:azureuser /var/www/portfolio && CURRENT_TARGET=\$(readlink -f /var/www/portfolio/current) && if [ \"\$CURRENT_TARGET\" = \"/var/www/portfolio/v1\" ]; then TARGET_DIR=\"/var/www/portfolio/v2\" ; INACTIVE=\"v2\" ; else TARGET_DIR=\"/var/www/portfolio/v1\" ; INACTIVE=\"v1\" ; fi && echo \"Deploying to \$INACTIVE\" && rm -rf \$TARGET_DIR/* && git clone --depth 1 https://github.com /tmp/gces-deploy && cp -r /tmp/gces-deploy/* \$TARGET_DIR/ && rm -rf /tmp/gces-deploy && ln -sfn \$TARGET_DIR /var/www/portfolio/current_tmp && mv -Tf /var/www/portfolio/current_tmp /var/www/portfolio/current && systemctl reload apache2"
