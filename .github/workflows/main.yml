- name: Deploy to server (FIXED)
  run: |
    sshpass -p "$PASS" scp -o StrictHostKeyChecking=no index.html "$USER@$HOST:/home/$USER/"
    sshpass -p "$PASS" scp -o StrictHostKeyChecking=no photo.jpg "$USER@$HOST:/home/$USER/"

    sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no "$USER@$HOST" "
      echo '$PASS' | sudo -S mv /home/$USER/index.html /var/www/html/index.html
      echo '$PASS' | sudo -S mv /home/$USER/photo.jpg /var/www/html/photo.jpg
      echo '$PASS' | sudo -S systemctl restart apache2
    "
